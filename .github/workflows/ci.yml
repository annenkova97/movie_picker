name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps (runtime + test)
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        run: python -m pytest -q
        env:
          # conftest sets these too, but be explicit so the suite never depends
          # on developer-machine state.
          JWT_SECRET: ci-test-secret-not-for-production-0123456789abcdef
          SKIP_AWARDS_SEED: "1"
          RATE_LIMIT_ENABLED: "0"

  frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-new
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-new/package-lock.json
      # `npm install` (not `npm ci`) because the committed package-lock.json
      # drifts from package.json under newer npm (vitest@4 → esbuild@0.28).
      # Regenerating the lock with a matching npm is a separate cleanup.
      - run: npm install --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm run test
